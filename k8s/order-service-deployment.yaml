apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: foodapp
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: foodapp
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: order-service
        app.kubernetes.io/name: order-service
        app.kubernetes.io/component: backend
    spec:
      # ── Bağımlılıkların hazır olmasını bekle ──
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "PostgreSQL bekleniyor..."
              until nc -z postgres-service 5432; do
                echo "PostgreSQL henuz hazir degil, 3s bekleniyor..."
                sleep 3
              done
              echo "PostgreSQL hazir!"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "RabbitMQ bekleniyor..."
              until nc -z rabbitmq-service 5672; do
                echo "RabbitMQ henuz hazir degil, 3s bekleniyor..."
                sleep 3
              done
              echo "RabbitMQ hazir!"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent   # Minikube/local için; registry kullanıyorsanız Always yapın
          ports:
            - containerPort: 8082
              protocol: TCP
              name: http

          # ── Environment: ConfigMap'ten ──
          envFrom:
            - configMapRef:
                name: order-service-config

          # ── Environment: Secret'tan ──
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: JWT_SECRET
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: INTERNAL_SECRET

            # ── JVM Ayarları ──
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Startup Probe: Spring Boot başlangıcı yavaş olabilir ──
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30    # 30 × 10s = 5 dakika max başlangıç süresi
            successThreshold: 1

          # ── Readiness Probe: Trafik almaya hazır mı? ──
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness Probe: Pod canlı mı? ──
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: foodapp
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: foodapp
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
