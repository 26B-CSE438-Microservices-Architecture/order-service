spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=ORDER
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672

jwt:
  secret: test-secret-key-for-testing-purposes-only-256-bits-long

internal:
  secret: test-internal-secret

order:
  payment-timeout-minutes: 10
  restaurant-timeout-minutes: 5
  delivery-fee: 15.00
