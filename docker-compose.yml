services:
  postgres:
    image: postgres:15-alpine
    container_name: order_postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: order_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  order-service:
    build: .
    container_name: order_service
    ports:
      - "${ORDER_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      RESTAURANT_SERVICE_URL: ${RESTAURANT_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PAYMENT_TIMEOUT_MINUTES: ${PAYMENT_TIMEOUT_MINUTES}
      RESTAURANT_TIMEOUT_MINUTES: ${RESTAURANT_TIMEOUT_MINUTES}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: always

volumes:
  postgres_data: